<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tami Asistan v2.1 - Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-16">

    <header class="border-b border-zinc-800 sticky top-0 bg-zinc-950/90 backdrop-blur-md z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span id="cloudStatusDot" class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
            <h1 class="text-lg font-black tracking-widest text-white">tami <span class="text-lime-400 font-light text-sm">asistan</span></h1>
        </div>
        <button id="permissionBtn" class="text-[10px] bg-lime-400/10 text-lime-400 border border-lime-400/20 px-3 py-1 rounded-full font-mono hover:bg-lime-400 hover:text-zinc-950 transition cursor-pointer">
            🔔 Bildirimleri Aktif Et
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6 space-y-6">

        <div id="asistanKutusu" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-xl">
            <h2 class="text-xs font-bold text-lime-400 uppercase tracking-wider mb-2">🚨 Dijital Asistan Raporu</h2>
            <p id="asistanMesaji" class="text-sm text-zinc-300">Sistem başlatılıyor, lütfen bekleyin...</p>
        </div>

        <section id="safakKartal" class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl text-center shadow-lg space-y-2">
            <p class="text-xs text-zinc-400 font-mono uppercase">🎯 Hedef Şafak Hesaplayıcı</p>
            <h2 id="safakMetni" class="text-md font-bold text-white">Harçlık ve hedef bilgisi bekleniyor...</h2>
            <div class="w-full bg-zinc-950 h-2 rounded-full overflow-hidden border border-zinc-800 mt-2">
                <div id="safakBar" class="bg-lime-400 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <section class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl shadow-md">
                <h3 class="text-sm font-bold text-zinc-400 mb-2">💰 Harçlık Durumu</h3>
                <div>
                    <label class="block text-[11px] text-zinc-500 font-mono mb-1">Haftalık Sabit Harçlığın (TL)</label>
                    <input type="number" id="weeklyIncome" placeholder="Örn: 200" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 text-sm text-lime-400 font-bold focus:outline-none focus:border-lime-400">
                </div>
            </section>

            <section class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl shadow-md space-y-3">
                <h3 class="text-sm font-bold text-zinc-400">🎯 Hayalindeki Hedef</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div class="col-span-2">
                        <label class="block text-[11px] text-zinc-500 font-mono mb-1">Almak İstediğin Şey</label>
                        <input type="text" id="targetName" placeholder="Örn: Wraith W60 Keyboard" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-lime-400">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[11px] text-zinc-500 font-mono mb-1">Hedefin Fiyatı (TL)</label>
                        <input type="number" id="targetPrice" placeholder="Örn: 2500" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-lime-400">
                    </div>
                </div>
            </section>

            <button id="saveFinanceBtn" class="md:col-span-2 w-full bg-lime-400 text-zinc-950 text-xs font-bold py-3 rounded-xl hover:bg-lime-300 transition cursor-pointer shadow-lg">
                Hesapla ve Buluta Kaydet
            </button>
        </div>

        <section class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl shadow-md">
            <h3 class="text-sm font-bold text-zinc-400 mb-3">💳 Yeni Abonelik / Üyelik Ekle</h3>
            <form id="subForm" class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <input type="text" id="subName" placeholder="Abonelik Adı (Örn: Spotify)" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-zinc-600" required>
                <input type="number" id="subPrice" placeholder="Aylık Ücret (TL)" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-zinc-600" required>
                <input type="number" id="subDay" placeholder="Günü (1-31)" min="1" max="31" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-zinc-600" required>
                <button type="submit" class="sm:col-span-3 bg-zinc-800 border border-zinc-700 text-white font-medium rounded-xl text-sm p-2.5 hover:bg-zinc-700 transition cursor-pointer">Aboneliği Listeye Ekle</button>
            </form>
        </section>

        <section class="space-y-3">
            <h3 class="text-sm font-bold text-zinc-400">📋 Aktif Aboneliklerin</h3>
            <div id="subList" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </section>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7o96OrqwYXWby-TH7EPbdoXZo_kKscA",
            authDomain: "akilli-gardirob.firebaseapp.com",
            projectId: "akilli-gardirob",
            storageBucket: "akilli-gardirob.appspot.com",
            messagingSenderId: "801290029571",
            appId: "1:801290029571:web:102b22c6423a92bca6dc36",
            measurementId: "G-GWM8N1FE3M"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const subForm = document.getElementById("subForm");
        const subList = document.getElementById("subList");
        const asistanMesaji = document.getElementById("asistanMesaji");
        const safakMetni = document.getElementById("safakMetni");
        const safakBar = document.getElementById("safakBar");
        const permissionBtn = document.getElementById("permissionBtn");
        const cloudStatusDot = document.getElementById("cloudStatusDot");

        let haftalikHarclik = 0, hedefIsim = "", hedefFiyat = 0, toplamAylikGider = 0;

        if (Notification.permission === "granted") {
            permissionBtn.innerText = "🔔 Bildirimler Aktif";
            permissionBtn.disabled = true;
        }

        permissionBtn.addEventListener("click", () => {
            Notification.requestPermission().then(p => {
                if (p === "granted") {
                    permissionBtn.innerText = "🔔 Bildirimler Aktif";
                    permissionBtn.disabled = true;
                    new Notification("Tami Asistan", { body: "Sistem aktif kanka!" });
                }
            });
        });

        function hesaplaVeRaporla() {
            if (haftalikHarclik <= 0 || hedefFiyat <= 0) {
                safakMetni.innerHTML = "💡 <span class='text-zinc-400'>Lütfen bilgileri girip 'Hesapla ve Buluta Kaydet' butonuna bas kanka!</span>";
                safakBar.style.width = "0%";
                return;
            }
            const aylikKazanc = haftalikHarclik * 4.33;
            const aylikNetBiriken = aylikKazanc - toplamAylikGider;

            if (aylikNetBiriken <= 0) {
                safakMetni.innerHTML = `❌ <span class='text-red-400 font-bold'>Abonelik giderlerin harçlığını geçiyor!</span>`;
                safakBar.style.width = "0%";
                return;
            }

            const gerekenAy = hedefFiyat / aylikNetBiriken;
            const toplamKalanGun = Math.ceil(gerekenAy * 30);
            const kalanHafta = Math.floor(toplamKalanGun / 7);
            const kalanGunMod = toplamKalanGun % 7;

            safakMetni.innerHTML = `🎯 <span class='text-lime-400 font-bold'>${hedefIsim}</span> için gereken süre:<br><span class='text-xl font-black text-white block my-1'>${kalanHafta} Hafta ${kalanGunMod} Gün</span>`;
            const yuzde = Math.min(100, Math.max(10, (100 - (kalanHafta * 2))));
            safakBar.style.width = `${yuzde}%`;
        }

        function verileriYukle() {
            cloudStatusDot.className = "w-3 h-3 bg-lime-400 rounded-full";
            asistanMesaji.innerHTML = `✅ <span class="text-lime-400 font-bold">Bulut Aktif.</span> Önümüzdeki 24 saat içinde çekilecek acil bir abonelik ödemen bulunmuyor kanka.`;

            db.collection("user_finance").doc("tami_user").get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById("weeklyIncome").value = data.weeklyIncome || "";
                    document.getElementById("targetName").value = data.targetName || "";
                    document.getElementById("targetPrice").value = data.targetPrice || "";
                    haftalikHarclik = Number(data.weeklyIncome) || 0;
                    hedefIsim = data.targetName || "";
                    hedefFiyat = Number(data.targetPrice) || 0;
                    hesaplaVeRaporla();
                }
            }).catch(e => console.log("Finans yükleme pas geçildi, ilk kayıt bekleniyor."));

            db.collection("subscriptions").onSnapshot((snapshot) => {
                subList.innerHTML = "";
                toplamAylikGider = 0;
                let yaklasanOdemeler = [];
                const guncelGun = new Date().getDate();

                snapshot.forEach((doc) => {
                    const sub = doc.data();
                    toplamAylikGider += Number(sub.price);
                    let kalanGun = sub.day - guncelGun;
                    if (kalanGun < 0) kalanGun = (30 - guncelGun) + Number(sub.day);

                    if (kalanGun === 1) {
                        yaklasanOdemeler.push(sub.name);
                        if (Notification.permission === "granted") {
                            new Notification("⚠️ ÖDEME HATIRLATMASI!", { body: `Yarın ${sub.name} günü!` });
                        }
                    }

                    const card = document.createElement("div");
                    card.className = "bg-zinc-900 border border-zinc-800 rounded-xl p-3 flex justify-between items-center";
                    card.innerHTML = `
                        <div>
                            <h4 class="text-xs font-bold text-white font-mono uppercase">${sub.name}</h4>
                            <p class="text-[11px] text-zinc-500">Ücret: ${sub.price} TL | Gün: ${sub.day}</p>
                            <span class="text-[9px] ${kalanGun <= 3 ? 'text-red-400 bg-red-400/10' : 'text-zinc-400 bg-zinc-950'} px-2 py-0.5 rounded font-mono inline-block mt-1">⏳ ${kalanGun} gün kaldı</span>
                        </div>
                        <button onclick="deleteSub('${doc.id}')" class="text-xs text-zinc-600 hover:text-red-400 cursor-pointer p-1">🗑️</button>
                    `;
                    subList.appendChild(card);
                });

                if (yaklasanOdemeler.length > 0) {
                    asistanMesaji.innerHTML = `⚠️ <span class="text-red-400 font-bold">DİKKAT!</span> Yarın ödemesi olanlar: <span class="text-white">${yaklasanOdemeler.join(", ")}</span>`;
                }
                hesaplaVeRaporla();
            });
        }

        document.getElementById("saveFinanceBtn").addEventListener("click", async () => {
            const w = document.getElementById("weeklyIncome").value;
            const tn = document.getElementById("targetName").value;
            const tp = document.getElementById("targetPrice").value;

            haftalikHarclik = Number(w);
            hedefIsim = tn;
            hedefFiyat = Number(tp);
            hesaplaVeRaporla();

            try {
                await db.collection("user_finance").doc("tami_user").set({ weeklyIncome: haftalikHarclik, targetName: hedefIsim, targetPrice: hedefFiyat });
                alert("Veriler eşitlendi kanka! 🚀");
            } catch (e) {
                console.log("Bulut kaydı lokal çalışıyor.");
            }
        });

        subForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const n = document.getElementById("subName").value;
            const p = document.getElementById("subPrice").value;
            const d = document.getElementById("subDay").value;

            try {
                await db.collection("subscriptions").add({ name: n, price: Number(p), day: Number(d) });
                subForm.reset();
            } catch (error) { alert("Hata oluştu kanka!"); }
        });

        window.deleteSub = async (id) => {
            if(confirm("Silinsin mi kanka?")) await db.collection("subscriptions").doc(id).delete();
        };

        window.onload = verileriYukle;
    </script>
</body>
</html>
